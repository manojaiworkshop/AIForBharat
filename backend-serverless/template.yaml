AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Mercury Grid - Serverless Backend (Python 3.11)

Parameters:
  OpenAIApiKey:
    Type: String
    Default: ""
    Description: OpenAI API key (set via --parameter-overrides or SSM)
  JwtSecret:
    Type: String
    Default: "mercury-grid-change-me-in-production"
    Description: JWT signing secret
  SuperadminEmail:
    Type: String
    Default: "hembrammanoj.ai@gmail.com"
    Description: Superadmin email address
  SuperadminPassword:
    Type: String
    Default: "Xplorer_2030"
    NoEcho: true
    Description: Superadmin password

Globals:
  Function:
    Timeout: 60
    MemorySize: 512
    Runtime: python3.11
    Environment:
      Variables:
        POWERTOOLS_SERVICE_NAME: mercury-grid
        LOG_LEVEL: INFO
        USERS_TABLE: !Ref MercuryGridUsersTable
        CHATS_TABLE: !Ref MercuryGridChatsTable
        OPENAI_API_KEY: !Ref OpenAIApiKey
        OPENAI_MODEL: gpt-4o-mini
        JWT_SECRET: !Ref JwtSecret
        DB_CONNECTIONS_TABLE: !Ref MercuryGridDbConnectionsTable
        SETTINGS_TABLE: !Ref MercuryGridSettingsTable
        CSV_TABLES_TABLE: !Ref MercuryGridCsvTablesTable
        CSV_BUCKET: !Ref MercuryGridCsvFilesBucket
        SUPERADMIN_EMAIL: !Ref SuperadminEmail
        SUPERADMIN_PASSWORD: !Ref SuperadminPassword
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization,X-Request-ID'"
      AllowOrigin: "'*'"

Resources:

  # ── DynamoDB: Users ──────────────────────────────────────────
  MercuryGridUsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: mercury-grid-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH

  # ── DynamoDB: Chats ──────────────────────────────────────────
  MercuryGridChatsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: mercury-grid-chats
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: conversation_id
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: conversation_id
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: user-id-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ── DynamoDB: DB Connections ────────────────────────────────
  MercuryGridDbConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: mercury-grid-db-connections
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: connection_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
        - AttributeName: connection_id
          KeyType: RANGE

  # ── DynamoDB: App Settings ──────────────────────────────────
  MercuryGridSettingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: mercury-grid-settings
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: setting_key
          AttributeType: S
      KeySchema:
        - AttributeName: setting_key
          KeyType: HASH

  # ── S3: CSV File Storage ─────────────────────────────────
  MercuryGridCsvFilesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "mercury-grid-csv-${AWS::AccountId}"
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ['*']
            AllowedMethods: [GET, PUT, POST, DELETE, HEAD]
            AllowedHeaders: ['*']
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldFiles
            Status: Enabled
            ExpirationInDays: 365

  # ── DynamoDB: Agents ──────────────────────────────────────
  MercuryGridAgentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: mercury-grid-agents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: agent_id
          AttributeType: S
      KeySchema:
        - AttributeName: agent_id
          KeyType: HASH

  # ── DynamoDB: CSV Tables ───────────────────────────────────
  MercuryGridCsvTablesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: mercury-grid-csv-tables
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: table_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
        - AttributeName: table_id
          KeyType: RANGE

  # ── IAM Policy for S3 CSV bucket ────────────────────────────
  S3CsvPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: mercury-grid-s3-csv-policy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
              - s3:ListBucket
            Resource:
              - !GetAtt MercuryGridCsvFilesBucket.Arn
              - !Sub "${MercuryGridCsvFilesBucket.Arn}/*"

  # ── IAM Policy for DynamoDB ──────────────────────────────────
  DynamoDBPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: mercury-grid-dynamodb-policy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:GetItem
              - dynamodb:UpdateItem
              - dynamodb:DeleteItem
              - dynamodb:Query
              - dynamodb:Scan
            Resource:
              - !GetAtt MercuryGridUsersTable.Arn
              - !GetAtt MercuryGridChatsTable.Arn
              - !Sub "${MercuryGridChatsTable.Arn}/index/user-id-index"
              - !GetAtt MercuryGridDbConnectionsTable.Arn
              - !GetAtt MercuryGridSettingsTable.Arn
              - !GetAtt MercuryGridCsvTablesTable.Arn
              - !GetAtt MercuryGridAgentsTable.Arn

  # ── Admin ────────────────────────────────────────────────────
  AdminFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mercury-grid-admin
      CodeUri: src/
      Handler: handlers.admin.lambda_handler
      Description: Superadmin user management
      Policies:
        - !Ref DynamoDBPolicy
      Events:
        AdminListUsers:
          Type: Api
          Properties:
            Path: /admin/users
            Method: GET
        AdminCreateUser:
          Type: Api
          Properties:
            Path: /admin/users
            Method: POST
        AdminGetUser:
          Type: Api
          Properties:
            Path: /admin/users/{user_id}
            Method: GET
        AdminUpdateUser:
          Type: Api
          Properties:
            Path: /admin/users/{user_id}
            Method: PUT
        AdminDeleteUser:
          Type: Api
          Properties:
            Path: /admin/users/{user_id}
            Method: DELETE
        AdminResetPassword:
          Type: Api
          Properties:
            Path: /admin/users/{user_id}/reset-password
            Method: POST
        AdminChangePassword:
          Type: Api
          Properties:
            Path: /admin/me/change-password
            Method: PUT
        AdminListConnections:
          Type: Api
          Properties:
            Path: /admin/connections
            Method: GET
        AdminSaveConnection:
          Type: Api
          Properties:
            Path: /admin/connections
            Method: POST
        AdminDeleteConnection:
          Type: Api
          Properties:
            Path: /admin/connections/{connection_id}
            Method: DELETE
        AdminTestConnection:
          Type: Api
          Properties:
            Path: /admin/connections/{connection_id}/test
            Method: POST
        AdminGetLLMSettings:
          Type: Api
          Properties:
            Path: /admin/llm-settings
            Method: GET
        AdminSaveLLMSettings:
          Type: Api
          Properties:
            Path: /admin/llm-settings
            Method: PUT
        AdminGetQdrantSettings:
          Type: Api
          Properties:
            Path: /admin/qdrant-settings
            Method: GET
        AdminSaveQdrantSettings:
          Type: Api
          Properties:
            Path: /admin/qdrant-settings
            Method: PUT
        AdminTestQdrantSettings:
          Type: Api
          Properties:
            Path: /admin/qdrant-settings/test
            Method: POST
        AdminGetRedisSettings:
          Type: Api
          Properties:
            Path: /admin/redis-settings
            Method: GET
        AdminSaveRedisSettings:
          Type: Api
          Properties:
            Path: /admin/redis-settings
            Method: PUT
        AdminTestRedisSettings:
          Type: Api
          Properties:
            Path: /admin/redis-settings/test
            Method: POST
        AdminListAgentPerms:
          Type: Api
          Properties:
            Path: /admin/agent-permissions
            Method: GET
        AdminGetAgentPerm:
          Type: Api
          Properties:
            Path: /admin/agent-permissions/{agent_id}
            Method: GET
        AdminSetAgentPerm:
          Type: Api
          Properties:
            Path: /admin/agent-permissions/{agent_id}
            Method: PUT
        AdminShareAgent:
          Type: Api
          Properties:
            Path: /admin/agent-permissions/{agent_id}/share
            Method: POST
        AdminUnshareAgent:
          Type: Api
          Properties:
            Path: /admin/agent-permissions/{agent_id}/share
            Method: DELETE
        AdminOptions:
          Type: Api
          Properties:
            Path: /admin/{proxy+}
            Method: OPTIONS
  # ── CSV Upload ────────────────────────────────────────
  CsvFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mercury-grid-csv
      CodeUri: src/
      Handler: handlers.csv_upload.lambda_handler
      Description: CSV/Excel file upload and table management
      Timeout: 60
      MemorySize: 512
      Policies:
        - !Ref DynamoDBPolicy
        - !Ref S3CsvPolicy
      Events:
        CsvUpload:
          Type: Api
          Properties:
            Path: /csv/upload
            Method: POST
        CsvListTables:
          Type: Api
          Properties:
            Path: /csv/tables
            Method: GET
        CsvGetTable:
          Type: Api
          Properties:
            Path: /csv/tables/{table_id}
            Method: GET
        CsvDeleteTable:
          Type: Api
          Properties:
            Path: /csv/tables/{table_id}
            Method: DELETE
        CsvCreateTable:
          Type: Api
          Properties:
            Path: /csv/tables/{table_id}/create-table
            Method: POST
        CsvDropTable:
          Type: Api
          Properties:
            Path: /csv/tables/{table_id}/drop-table
            Method: DELETE
        CsvOptions:
          Type: Api
          Properties:
            Path: /csv/{proxy+}
            Method: OPTIONS
  # ── DB Connect ─────────────────────────────────────────────
  DbConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mercury-grid-db-connect
      CodeUri: ../connectdb-serverless/src/
      Handler: handlers.db_connect.lambda_handler
      Description: PostgreSQL database connection management
      Timeout: 30
      Policies:
        - !Ref DynamoDBPolicy
      Events:
        DbTest:
          Type: Api
          Properties:
            Path: /db/test
            Method: POST
        DbConnect:
          Type: Api
          Properties:
            Path: /db/connect
            Method: POST
        DbConnections:
          Type: Api
          Properties:
            Path: /db/connections
            Method: GET
        DbTables:
          Type: Api
          Properties:
            Path: /db/tables
            Method: GET
        DbCachedTables:
          Type: Api
          Properties:
            Path: /db/cached-tables
            Method: GET
        DbSchema:
          Type: Api
          Properties:
            Path: /db/schema
            Method: GET
        DbQuery:
          Type: Api
          Properties:
            Path: /db/query
            Method: POST
        DbDisconnect:
          Type: Api
          Properties:
            Path: /db/connection
            Method: DELETE
        DbOptions:
          Type: Api
          Properties:
            Path: /db/{proxy+}
            Method: OPTIONS

  # ── Health Check ────────────────────────────────────────────
  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mercury-grid-health
      CodeUri: src/
      Handler: handlers.health.lambda_handler
      Description: Health check endpoint
      Events:
        HealthGet:
          Type: Api
          Properties:
            Path: /health
            Method: GET

  # ── Auth ─────────────────────────────────────────────────────
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mercury-grid-auth
      CodeUri: src/
      Handler: handlers.auth.lambda_handler
      Description: User registration and login
      Policies:
        - !Ref DynamoDBPolicy
      Events:
        AuthRegister:
          Type: Api
          Properties:
            Path: /auth/register
            Method: POST
        AuthLogin:
          Type: Api
          Properties:
            Path: /auth/login
            Method: POST
        AuthOptions:
          Type: Api
          Properties:
            Path: /auth/{proxy+}
            Method: OPTIONS

  # ── Chat ─────────────────────────────────────────────────────
  ChatFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mercury-grid-chat
      CodeUri: src/
      Handler: handlers.chat.lambda_handler
      Description: Chat message processing with OpenAI
      Policies:
        - !Ref DynamoDBPolicy
      Events:
        ChatPost:
          Type: Api
          Properties:
            Path: /chat
            Method: POST
        ChatOptions:
          Type: Api
          Properties:
            Path: /chat
            Method: OPTIONS

  # ── History ──────────────────────────────────────────────────
  HistoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mercury-grid-history
      CodeUri: src/
      Handler: handlers.history.lambda_handler
      Description: Retrieve and manage chat history from DynamoDB
      Policies:
        - !Ref DynamoDBPolicy
      Events:
        HistoryGet:
          Type: Api
          Properties:
            Path: /history
            Method: GET
        HistoryDelete:
          Type: Api
          Properties:
            Path: /history
            Method: DELETE
        ConversationsList:
          Type: Api
          Properties:
            Path: /history/conversations
            Method: GET
        HistoryPatch:
          Type: Api
          Properties:
            Path: /history
            Method: PATCH
        HistoryOptions:
          Type: Api
          Properties:
            Path: /history
            Method: OPTIONS
        ConversationsOptions:
          Type: Api
          Properties:
            Path: /history/conversations
            Method: OPTIONS

Outputs:
  ApiBaseUrl:
    Description: API Gateway base URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
  ChatEndpoint:
    Description: Chat POST endpoint
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/chat"
  AuthRegisterEndpoint:
    Description: Register POST endpoint
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/auth/register"
  AuthLoginEndpoint:
    Description: Login POST endpoint
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/auth/login"
  UsersTableName:
    Description: DynamoDB Users table name
    Value: !Ref MercuryGridUsersTable
  ChatsTableName:
    Description: DynamoDB Chats table name
    Value: !Ref MercuryGridChatsTable
  DbConnectionsTableName:
    Description: DynamoDB DB Connections table name
    Value: !Ref MercuryGridDbConnectionsTable
  DbConnectEndpoint:
    Description: DB Connect base endpoint
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/db"
